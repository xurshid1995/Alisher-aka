<!DOCTYPE html>
<html lang="{{ 'ru' if current_language == 'ru' else 'uz' }}" data-current-lang="{{ current_language }}" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{{ t('login_title') }}</title>
    {% if current_language == 'ru' %}
    <link type="image/png" sizes="96x96" rel="icon" href="{{ url_for('static', filename='images/icons8-russia-emoji-96.png') }}">
    {% else %}
    <link type="image/png" sizes="96x96" rel="icon" href="{{ url_for('static', filename='images/icons8-uzbekistan-emoji-96.png') }}">
    {% endif %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        width: 100%;
        background: #f5f6fa;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Language Selector ── */
    .login-lang-selector {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 100;
    }
    .login-lang-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        background: white;
        color: #1e293b;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        outline: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        transition: all 0.2s;
    }
    .login-lang-btn:hover {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .login-lang-menu {
        display: none;
        position: absolute;
        top: 110%;
        right: 0;
        background: white;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        min-width: 170px;
        overflow: hidden;
        z-index: 9999;
    }
    .login-lang-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 13px;
        color: #374151;
        transition: background 0.15s;
    }
    .login-lang-option:hover { background: #eff6ff; color: #2563eb; }
    .login-lang-option.active { background: #eff6ff; font-weight: 600; color: #2563eb; }

    /* ── Page Layout ── */
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .login-wrap {
        width: 100%;
        max-width: 440px;
    }

    /* ── Brand Header ── */
    .login-brand {
        text-align: center;
        margin-bottom: 28px;
    }
    .login-brand-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #dbeafe, #bfdbfe);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        font-size: 26px;
        color: #2563eb;
        box-shadow: 0 4px 14px rgba(37,99,235,0.15);
    }
    .login-brand h1 {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 4px;
        letter-spacing: -0.3px;
    }
    .login-brand p {
        font-size: 13px;
        color: #94a3b8;
        font-weight: 500;
    }

    /* ── Card ── */
    .login-card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        border: 1px solid #f1f5f9;
    }

    /* ── Alerts ── */
    .alert {
        padding: 12px 14px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 13.5px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .alert-error {
        background: #fef2f2;
        border: 1.5px solid #fecaca;
        color: #dc2626;
    }
    .alert-warning {
        background: #fffbeb;
        border: 1.5px solid #fde68a;
        color: #92400e;
    }

    /* ── Form ── */
    .form-group {
        margin-bottom: 18px;
    }
    .form-group label {
        display: block;
        margin-bottom: 7px;
        color: #374151;
        font-weight: 600;
        font-size: 13px;
    }

    .ps-input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        background: #f8fafc;
        color: #1e293b;
        transition: all 0.2s;
        outline: none;
        box-sizing: border-box;
    }
    .ps-input::placeholder { color: #94a3b8; }
    .ps-input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        background: white;
    }
    .ps-input.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }

    .password-wrapper { position: relative; }
    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        color: #94a3b8;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s;
    }
    .password-toggle:hover { color: #2563eb; }

    .error-message {
        color: #ef4444;
        font-size: 12px;
        margin-top: 5px;
        display: none;
        font-weight: 500;
    }

    /* ── Remember / Forgot ── */
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 6px 0 22px;
        font-size: 13px;
    }
    .remember-me {
        display: flex;
        align-items: center;
        gap: 7px;
        color: #374151;
        font-weight: 500;
        cursor: pointer;
    }
    .remember-me input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: #2563eb;
        cursor: pointer;
    }
    .forgot-password {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    .forgot-password:hover { color: #1d4ed8; text-decoration: underline; }

    /* ── Login Button ── */
    .btn-login {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        letter-spacing: 0.2px;
    }
    .btn-login:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(37,99,235,0.4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    /* ── Footer Note ── */
    .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #94a3b8;
    }

    .loading { opacity: 0.7; pointer-events: none; }

    @media (max-width: 480px) {
        .login-card { padding: 24px 20px; }
        .login-brand h1 { font-size: 19px; }
    }
    </style>
</head>
<body>
    <!-- Til tanlash -->
    <div class="login-lang-selector">
        <button type="button" class="login-lang-btn" id="loginLangBtn" onclick="toggleLoginLang()">
            {% if current_language == 'uz_cyrillic' %}
            <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#0099B5"/><rect y="4.67" width="20" height="4.67" fill="#fff"/><rect y="9.33" width="20" height="4.67" fill="#1EB53A"/><rect y="4.17" width="20" height="1" fill="#CE1126"/><rect y="8.83" width="20" height="1" fill="#CE1126"/><circle cx="6" cy="2.3" r="1.3" fill="#fff"/><circle cx="6.6" cy="2.3" r="1" fill="#0099B5"/></svg> <span>Ўзбекча</span>
            {% elif current_language == 'ru' %}
            <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#fff"/><rect y="4.67" width="20" height="4.67" fill="#0039A6"/><rect y="9.33" width="20" height="4.67" fill="#D52B1E"/></svg> <span>Русский</span>
            {% else %}
            <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#0099B5"/><rect y="4.67" width="20" height="4.67" fill="#fff"/><rect y="9.33" width="20" height="4.67" fill="#1EB53A"/><rect y="4.17" width="20" height="1" fill="#CE1126"/><rect y="8.83" width="20" height="1" fill="#CE1126"/><circle cx="6" cy="2.3" r="1.3" fill="#fff"/><circle cx="6.6" cy="2.3" r="1" fill="#0099B5"/></svg> <span>O'zbekcha</span>
            {% endif %}
            <span style="font-size:10px;">▼</span>
        </button>
        <div class="login-lang-menu" id="loginLangMenu">
            <div class="login-lang-option{% if current_language == 'uz_latin' %} active{% endif %}" onclick="changeLoginLang('uz_latin')">
                <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#0099B5"/><rect y="4.67" width="20" height="4.67" fill="#fff"/><rect y="9.33" width="20" height="4.67" fill="#1EB53A"/><rect y="4.17" width="20" height="1" fill="#CE1126"/><rect y="8.83" width="20" height="1" fill="#CE1126"/><circle cx="6" cy="2.3" r="1.3" fill="#fff"/><circle cx="6.6" cy="2.3" r="1" fill="#0099B5"/></svg> O'zbekcha
            </div>
            <div class="login-lang-option{% if current_language == 'uz_cyrillic' %} active{% endif %}" onclick="changeLoginLang('uz_cyrillic')">
                <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#0099B5"/><rect y="4.67" width="20" height="4.67" fill="#fff"/><rect y="9.33" width="20" height="4.67" fill="#1EB53A"/><rect y="4.17" width="20" height="1" fill="#CE1126"/><rect y="8.83" width="20" height="1" fill="#CE1126"/><circle cx="6" cy="2.3" r="1.3" fill="#fff"/><circle cx="6.6" cy="2.3" r="1" fill="#0099B5"/></svg> Ўзбекча
            </div>
            <div class="login-lang-option{% if current_language == 'ru' %} active{% endif %}" onclick="changeLoginLang('ru')">
                <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0;"><rect width="20" height="4.67" fill="#fff"/><rect y="4.67" width="20" height="4.67" fill="#0039A6"/><rect y="9.33" width="20" height="4.67" fill="#D52B1E"/></svg> Русский
            </div>
        </div>
    </div>

    <div class="login-page">
        <div class="login-wrap">

            <!-- Brand -->
            <div class="login-brand">
                <div class="login-brand-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>{{ t('login_title') }}</h1>
                <p>DiamondCar Accessories CRM</p>
            </div>

            <!-- Card -->
            <div class="login-card">

                <!-- Session tugash xabari -->
                <div id="sessionExpiredAlert" class="alert alert-warning" style="display: none;">
                    <span>⏰ {{ t('session_expired') }}</span>
                </div>

                <!-- Xatolik xabari -->
                <div id="errorAlert" class="alert alert-error" style="display: none;">
                    <span id="errorMessage"></span>
                </div>

                <!-- Server-side xatolik -->
                {% if error_message %}
                <div class="alert alert-error">
                    <span>{{ error_message }}</span>
                </div>
                {% endif %}

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">{{ t('username') }}</label>
                        <input type="text"
                               id="username"
                               name="username"
                               class="ps-input"
                               placeholder="{{ t('username') }}"
                               autocomplete="username"
                               required>
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">{{ t('password') }}</label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="ps-input"
                                   placeholder="{{ t('password') }}"
                                   autocomplete="current-password"
                                   style="padding-right: 42px;"
                                   required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="remember">
                            <span>{{ t('remember_me') }}</span>
                        </label>
                        <a href="#" class="forgot-password">{{ t('forgot_password') }}</a>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        {{ t('login_button') }}
                    </button>
                </form>
            </div>

            <div class="login-footer">© 2026 DiamondCar Accessories</div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const sessionExpiredAlert = document.getElementById('sessionExpiredAlert');

        // Session tugash parametrini tekshirish
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session_expired') === 'true') {
            sessionExpiredAlert.style.display = 'block';
            
            // Saqlangan sahifa ma'lumotlarini localStorage'dan olish
            const savedData = localStorage.getItem('session_backup');
            if (savedData) {
                try {
                    const pageData = JSON.parse(savedData);
                    console.log('💾 Saqlangan ma\'lumotlar:', pageData);
                    
                    // URL'dan return_url parametrini olish
                    const returnUrl = urlParams.get('return_url');
                    if (returnUrl) {
                        // Login muvaffaqiyatli bo'lgandan keyin qaytish uchun saqlash
                        sessionStorage.setItem('return_url', returnUrl);
                    }
                } catch (e) {
                    console.error('Ma\'lumotlarni o\'qishda xatolik:', e);
                }
            }
        }

        form.addEventListener('submit', handleLogin);
    });

    async function handleLogin(e) {
        e.preventDefault();
        
        // Xatoliklarni tozalash
        clearErrors();
        
        const formData = new FormData(e.target);
        const loginData = {
            username: formData.get('username').trim(),
            password: formData.get('password').trim(),
            remember: formData.get('remember') === 'on'
        };

        // Validatsiya
        if (!validateLogin(loginData)) {
            return;
        }

        // Loading holatini ko'rsatish
        setLoading(true);

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(loginData)
            });

            const data = await response.json();

            if (data.success) {
                loginBtn.innerHTML = '✓ {{ t("success") }}';
                loginBtn.style.background = '#059669';
                setTimeout(() => {
                    window.location.href = data.redirect || '/dashboard';
                }, 1000);
            } else {
                // Xatolik
                showError(data.message || {{ t("login_error")|tojson }});
            }
        } catch (error) {
            console.error('Login error:', error);
            showError({{ t("server_connection_error")|tojson }});
        } finally {
            setLoading(false);
        }
    }

    function validateLogin(data) {
        let isValid = true;

        if (!data.username) {
            showFieldError('username', {{ t("required_field")|tojson }});
            isValid = false;
        }

        if (!data.password) {
            showFieldError('password', {{ t("required_field")|tojson }});
            isValid = false;
        }

        return isValid;
    }

    function showError(message) {
        errorMessage.textContent = message;
        errorAlert.style.display = 'block';
    }

    function showFieldError(field, message) {
        const input = document.getElementById(field);
        const errorDiv = document.getElementById(field + 'Error');
        
        input.classList.add('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    // Parolni ko'rsatish/yashirish
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.className = 'fas fa-eye-slash';
        } else {
            passwordInput.type = 'password';
            eyeIcon.className = 'fas fa-eye';
        }
    }

    function clearErrors() {
        errorAlert.style.display = 'none';
        
        const inputs = document.querySelectorAll('.ps-input');
        const errors = document.querySelectorAll('.error-message');
        
        inputs.forEach(input => input.classList.remove('error'));
        errors.forEach(error => {
            error.style.display = 'none';
            error.textContent = '';
        });
    }

    function setLoading(loading) {
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        
        if (loading) {
            form.classList.add('loading');
            loginBtn.innerHTML = '{{ t("loading") }}';
            loginBtn.disabled = true;
        } else {
            form.classList.remove('loading');
            loginBtn.innerHTML = '{{ t("login_button") }}';
            loginBtn.disabled = false;
        }
    }

    // Til o'zgartirish (login sahifasi)
    function changeLoginLang(lang) {
        fetch('/api/settings/language', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({language: lang})
        }).then(res => res.json()).then(data => {
            if (data.success) {
                window.location.reload();
            }
        }).catch(err => console.error('Til xato:', err));
    }

    function toggleLoginLang() {
        const menu = document.getElementById('loginLangMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('loginLangMenu');
        const btn = document.getElementById('loginLangBtn');
        if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
            menu.style.display = 'none';
        }
    });

    // CSRF himoya - POST fetch so'rovlariga X-CSRFToken header qo'shish
    (function () {
        const _origFetch = window.fetch;
        window.fetch = function (url, options) {
            options = options || {};
            const method = (options.method || 'GET').toUpperCase();
            if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
                const token = document.querySelector('meta[name="csrf-token"]');
                if (token) {
                    const hdrs = options.headers || {};
                    options.headers = Object.assign({}, hdrs, { 'X-CSRFToken': token.content });
                }
            }
            return _origFetch(url, options);
        };
    })();
    </script>
</body>
</html>
